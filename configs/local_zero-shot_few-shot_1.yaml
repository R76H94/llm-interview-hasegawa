model:
  provider: openai   # openai or google
  name: gpt-4o-2024-11-20 # gpt-4.1
  temperature: 0

interviewee:
  mode: "llm" # "human" or "llm"
  wait_human_sec: null  # 人間が回答するまでの待機時間

run:
  wait_time: 3
  out_dir: "/mnt/work/interview/out/zero-shot_few-shot/test/llm"

interview:
  max_total_count: 50  #デフォルト値：50
  min_total_count: 50  #デフォルト値：50
  use_question_slot_in_fill_slots: true  #true or false
  slot_selection_mode: "llm"  #"random" or "llm"

  # 話題順の制御 (新規追加)
  topic_mode: "record"  # "record": 記録する, "replay": 再生する, "free": 自由(既存動作)
  topic_order_file: "/mnt/work/interview/out/zero-shot_few-shot/test/llm/zero-shot_2/topic_order.json"  # replay時に指定: "out/20260205_143022/topic_order.json" など (デフォルト値 null)
  # 実行例:
  #
  # 1回目 (zero-shot, record モード):
  #   topic_mode: "record"
  #   topic_order_file: null
  #   プロンプト: zero-shot用のプロンプトファイルを指定
  #   → 実行後、out/20260205_143022/topic_order.json が生成される
  #
  # 2回目 (few-shot, replay モード):
  #   topic_mode: "replay"
  #   topic_order_file: "out/20260205_143022/topic_order.json"
  #   プロンプト: few-shot用のプロンプトファイルを指定
  #   → 1回目と同じ話題順でインタビューが実行される
  estimate_persona: "悩みや不満点: 未  \n通勤時の移動方法: 未  \n家族: 未" #デフォルト値 null
  persona_attribute_candidates: # スロット属性候補(デフォルトは50個)
    - 現在のキャリア
    - 性格
    - 過去のキャリア
    - 昇進・転職
    - SNS
    - 趣味
    - 使用しているスマートフォンアプリ
    - 個人の基本的情報
    - 未来像
    - タスク管理
    - 学生時代の失敗エピソード
    - 服装の好み
    - 昨日起きたとても悲しい出来事
    - 思い出・エピソード
    - 好きなゆるキャラ
    - 好きな食べ物
    - 嫌いな食べ物
    - 尊敬する人
    - 好きな音楽
    - 100年後の未来
    - 時間管理で気をつけていること
    - 副業
    - 恋愛
    - 学生時代の得意科目
    - 株式投資の経験
    - 資産運用の考え方
    - 人脈の広げ方
    - 起床後のルーティン
    - パソコンを使う頻度
    - 作るのが得意な料理
    - 断捨離や片付けのコツ
    - 海外旅行の楽しみ方
    - 語学学習のポイント
    - スポーツ観戦
    - スポーツジムの利用
    - 乗りたい車
    - 好きな芸能人
    - 行ってみたい国
    - オンライン会議における悩みごと
    - 感情のコントロールで気をつけていること
    - 金銭感覚の違い
  slots:
    通勤時の移動方法: null
    好きなお菓子: null
    かかりつけの病院: null
    好きな言葉・座右の銘: null
    悩みや不満点: null
    仕事の全体像: null
    家族: null
    飼っているペット: null
    在宅ワーク: null
    人生で一番つらかった出来事: null

paths:
  prompts:
    # fill_slots: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_fill_slots.txt"
    fill_slots: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_fill_slots_show_question_slot.txt"
    generate_slots: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_generate_slots.txt"
    generate_slots_2: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_generate_slots_2.txt"
    generate_questions: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_generating_question.txt"
    user_simulator: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_user_simulator.txt"
    end_conversation: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_end_conversation.txt"
    estimate_persona: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_estimate_persona-zeroshot.txt"
    # estimate_persona: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_estimate_persona_storestaff_llm_fewshot.txt"
    fukabori_questions: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_fukabori_questions.txt"
  persona_settings: "/mnt/work/interview/data/hashimoto-nakano/persona_settings/IT_engineer-Persona-Sonoda-202510/01.txt"
