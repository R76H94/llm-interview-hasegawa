model:
  provider: openai   # openai or google
  name: gpt-4o-2024-11-20 # gpt-4.1
  temperature: 0

interviewee:
  mode: "llm" # "human" or "llm"
  wait_human_sec: null  # 人間が回答するまでの待機時間

run:
  wait_time: 3
  out_dir: "/mnt/work/interview/out/zero-shot_few-shot/test"

interview:
  max_total_count: 20  #デフォルト値：50
  min_total_count: 20  #デフォルト値：50
  use_question_slot_in_fill_slots: true  #true or false
  slot_selection_mode: "llm"  #"random" or "llm"

  # 話題順の制御 (新規追加)
  topic_mode: "replay"  # "record": 記録する, "replay": 再生する, "free": 自由(既存動作)
  topic_order_file: "/mnt/work/interview/out/zero-shot_few-shot/test/20260210_045040/topic_order.json"  # replay時に指定: "out/20260205_143022/topic_order.json" など (デフォルト値 null)
  # 実行例:
  #
  # 1回目 (zero-shot, record モード):
  #   topic_mode: "record"
  #   topic_order_file: null
  #   プロンプト: zero-shot用のプロンプトファイルを指定
  #   → 実行後、out/20260205_143022/topic_order.json が生成される
  #
  # 2回目 (few-shot, replay モード):
  #   topic_mode: "replay"
  #   topic_order_file: "out/20260205_143022/topic_order.json"
  #   プロンプト: few-shot用のプロンプトファイルを指定
  #   → 1回目と同じ話題順でインタビューが実行される
  estimate_persona: "家族: 未  \nキャリア・職場: 未  \n悩みやストレス: 未  \n思い出・エピソード: 未  \n趣味: 未  \n金銭感覚: 未  \n性格: 未" #デフォルト値 null
  persona_attribute_candidates: # スロット属性候補(デフォルトは50個)
    - 服装の好み
  slots:
    家族: null
    現在のキャリア: null
    好きな音楽: null
    人生で一番つらかった出来事: null
    株式投資の経験: null
