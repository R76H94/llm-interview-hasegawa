model:
  provider: openai   # openai or google
  name: gpt-4o-2024-11-20
  temperature: 0

interviewee:
  mode: "human" # "human" or "llm"
  wait_human_sec: null  # 人間が回答するまでの待機時間

run:
  wait_time: 3
  out_dir: "out/NLP/random_zero-shot/human"

interview:
  max_total_count: 50  #デフォルト値：50
  min_total_count: 48  #デフォルト値：48
  use_question_slot_in_fill_slots: true  #true or false
  slot_selection_mode: "random"  #"random" or "llm"
  estimate_persona: "悩みやストレス: 未  \n仕事の満足度: 未  \n語学学習: 未  \n仕事における自己成長: 未  \n健康管理: 未  \n仕事におけるモチベーション: 未  \nパソコン利用状況: 未  \n服装の好み: 未  \n仕事における課題感: 未  \n職場での役割認識: 未  \n趣味: 未  \n職場でのコミュニケーション: 未  \nデザインへの価値観: 未  \n将来のキャリアビジョン: 未" #デフォルト値 null
  persona_attribute_candidates: # スロット属性候補(デフォルトは50個)
    - 現在のキャリア
    - 性格
    - 過去のキャリア
    - タスク管理
    - 思い出・エピソード
    - 好きなゆるキャラ
    - 嫌いな食べ物
    - 好きな音楽
    - 100年後の未来
    - 時間管理で気をつけていること
    - 人生で一番つらかった出来事
    - 在宅ワーク
    - 海外旅行の楽しみ方
    - スポーツジムの利用
    - 乗りたい車
    - オンライン会議における悩みごと
  slots:
    悩みや不満点: null
    仕事の満足度: null
    語学学習のポイント: null
    仕事における自己成長: null
    かかりつけの病院: null
    仕事におけるモチベーション: null
    学生時代の失敗エピソード: null
    仕事における課題解決力: null
    学生時代の得意科目: null
    パソコンを使う頻度: null
