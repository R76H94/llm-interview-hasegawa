    株式投資の経験: null
    職場での役割認識: null
    スポーツ観戦: null
    週末の過ごし方: null
    個人の基本的情報: null
    人脈の広げ方: null
    好きなお菓子: null
    家族: null
    使用しているスマートフォンアプリ: null
    職場でのコミュニケーションスタイル: null
