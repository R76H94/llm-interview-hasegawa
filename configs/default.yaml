model:
  provider: openai   # openai or google
  name: gpt-4o-2024-11-20
  temperature: 0

interviewee:
  mode: "human" # "human" or "llm"
  wait_human_sec: null  # 人間が回答するまでの待機時間

run:
  wait_time: 3
  out_dir: "out"

interview:
  max_total_count: 50  #デフォルト値：50
  min_total_count: 50  #デフォルト値：50
  use_question_slot_in_fill_slots: true  #true or false
  slot_selection_mode: "random"  #"random" or "llm"
  estimate_persona: "リフレッシュ方法: 未  \nキャリア・職場: 未  \n悩みや不満点: 未  \n将来のキャリアプラン: 未  \n家族: 未  \n思い出・エピソード: 未" #デフォルト値 null
  persona_attribute_candidates: # スロット属性候補(デフォルトは50個)
    - 現在のキャリア
    - 悩みや不満点
    - 性格
    - 過去のキャリア
    - 昇進・転職
    - SNS
    - 趣味
    - 家族
    - 使用しているスマートフォンアプリ
    - 個人の基本的情報
    - 未来像
    - タスク管理
    - 学生時代の失敗エピソード
    - 服装の好み
    - 昨日起きたとても悲しい出来事
    - 思い出・エピソード
    - 好きなゆるキャラ
    - 好きな食べ物
    - 好きな言葉・座右の銘
    - 嫌いな食べ物
    - 尊敬する人
    - 好きな音楽
    - 100年後の未来
    - 時間管理で気をつけていること
    - 副業
    - 好きなお菓子
    - 恋愛
    - 人生で一番つらかった出来事
    - 学生時代の得意科目
    - 株式投資の経験
    - 資産運用の考え方
    - 人脈の広げ方
    - 在宅ワーク
    - 起床後のルーティン
    - パソコンを使う頻度
    - かかりつけの病院
    - 作るのが得意な料理
    - 断捨離や片付けのコツ
    - 海外旅行の楽しみ方
    - 語学学習のポイント
    - スポーツ観戦
    - スポーツジムの利用
    - 飼っているペット
    - 乗りたい車
    - 好きな芸能人
    - 行ってみたい国
    - 通勤時の移動方法
    - オンライン会議における悩みごと
    - 感情のコントロールで気をつけていること
    - 金銭感覚の違い
  slots: {}

paths:
  prompts:
    fill_slots: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_fill_slots.txt"
    generate_slots: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_generate_slots.txt"
    generate_slots_2: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_generate_slots_2.txt"
    generate_questions: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_generating_question.txt"
    user_simulator: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_user_simulator.txt"
    end_conversation: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_end_conversation.txt"
    estimate_persona: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain/prompt_estimate_persona.txt"
    fukabori_questions: "data/hashimoto-nakano/prompt_semi_const/proposed_method/all_domain_tsuchida/prompt_fukabori_questions.txt"
  persona_settings: "data/hashimoto-nakano/persona_settings/IT_engineer-Persona-Sonoda-202510/01.txt"
