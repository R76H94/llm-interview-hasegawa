model:
  provider: openai   # openai | google
  name: gpt-4o-2024-11-20
  temperature: 0

interviewee:
  mode: "human" # "human" | "llm"
  wait_human_sec: null  # 人間が回答するまでの待機時間

run:
  wait_time: 3
  out_dir: "out"

interview:
  max_total_count: 30
  min_total_count: 25
  estimate_persona: "リフレッシュ方法: 未  \nキャリア・職場: 未  \n悩みや不満点: 未  \n将来のキャリアプラン: 未  \n家族: 未  \n思い出・エピソード: 未"
  persona_attribute_candidates:
    - "性格"
    - "過去のキャリア"
    - "昇進・転職"
    - "SNS"
    - "趣味"
    - "家族"
    - "使用しているスマートフォンアプリ"
    - "個人の基本的情報"
    - "未来像"
    - "タスク管理"
    - "学生時代の失敗エピソード"
    - "服装の好み"
    - "昨日起きたとても悲しい出来事"
    - "思い出・エピソード"
    - "好きなゆるキャラ"
    - "好きな食べ物"
    - "好きな言葉・座右の銘"
    - "嫌いな食べ物"
    - "尊敬する人"
    - "好きな音楽"
    - "100年後の未来"
    - "時間管理で気をつけていること"
    - "副業"
    - "好きなお菓子"
    - "恋愛"
    - "人生で一番つらかった出来事"
    - "学生時代の得意科目"
    - "株式投資の経験"
    - "資産運用の考え方"
    - "人脈の広げ方"
    - "在宅ワーク"
    - "乗馬の経験"
    - "起床後のルーティン"
    - "パソコンを使う頻度"
    - "かかりつけの病院"
    - "作るのが得意な料理"
    - "断捨離や片付けのコツ"
    - "海外旅行の楽しみ方"
    - "語学学習のポイント"
    - "スポーツ観戦"
    - "スポーツジムの利用"
    - "飼っているペット"
    - "乗りたい車"
    - "好きな芸能人"
    - "行ってみたい国"
    - "テクノロジーとの付き合い方"
    - "通勤時の移動方法"
    - "オンライン会議における悩みごと"
    - "感情のコントロールで気をつけていること"
    - "金銭感覚の違い"
  slots:
    現在のキャリア: {value: null}
    悩みや不満点:   {value: null}

paths:
  prompts:
    idle_talk: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_idle_talk.txt"
    fill_slots: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_fill_slots.txt"
    generate_slots: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_generate_slots.txt"
    generate_slots_2: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_generate_slots_2.txt"
    generate_questions: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_generating_question.txt"
    user_simulator: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_user_simulator.txt"
    career_topic: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_career_topic.txt"
    end_conversation: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_end_conversation.txt"
    estimate_persona: "/mnt/work/interview/data/hashimoto-nakano/prompt_semi_const/proposed_method/prompt_estimate_persona.txt"
  persona_settings: "/mnt/work/interview/data/hashimoto-nakano/persona_settings/hasegawa_data/hasegawa_p.txt"
  self_evaluation: "/mnt/work/interview/data/hashimoto-nakano/questionnaire/endo_q.json"
